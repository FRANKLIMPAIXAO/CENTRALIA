version: '3.8'
services:
  centralia:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - centralia_data:/app/backend/data
      - centralia_uploads:/app/backend/uploads
      - centralia_knowledge:/app/backend/knowledge
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=3001
      - APP_SECRET=${APP_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
volumes:
  centralia_data:
  centralia_uploads:
  centralia_knowledge:
