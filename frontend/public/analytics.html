<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Instagram — Central IA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00D4A0;--green-dim:#00D4A018;--green-border:#00D4A035;--green-glow:#00D4A040;
  --bg:#080c14;--bg-card:#0e1520;--bg-card2:#121b2a;--bg-modal:#0a1018;--bg-input:#0f1824;
  --text:#e8edf8;--text-sub:#7e8cb0;--text-muted:#3a4468;
  --border:#1e2840;--border2:#151f30;
  --red:#ff5c72;--yellow:#f5c542;--blue:#4f9eff;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;position:relative;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(#ffffff04 1px,transparent 1px),linear-gradient(90deg,#ffffff04 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.container{max-width:1100px;margin:0 auto;padding:32px 24px;position:relative;z-index:1;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin:28px 0 14px;display:flex;align-items:center;gap:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;}
.kpi-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6a7fa8;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.kpi-value{font-size:28px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;}
.kpi-sub{font-size:12px;color:#8899bb;margin-top:6px;}

/* Charts */
.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:10px;}
.chart-card-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6a7fa8;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.chart-wrap{position:relative;width:100%;height:190px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Posts */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px;}
.post-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;transition:.2s;}
.post-card.high-er{border-color:var(--green-border);background:linear-gradient(135deg,#0e1520,#0a1e18);}
.post-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.post-type{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 9px;border-radius:999px;font-weight:600;letter-spacing:1px;}
.type-reel{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.type-carousel{background:#0d1a2e;color:var(--blue);border:1px solid #1e2f4a;}
.type-image{background:#1a140d;color:var(--yellow);border:1px solid #2e2010;}
.type-feed{background:#1a0d1a;color:#dd88ff;border:1px solid #2e1a2e;}
.post-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:#6a7fa8;margin-left:auto;}
.post-caption{font-size:12px;color:#aab8d0;line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.post-metric{text-align:center;background:var(--bg-input);border-radius:8px;padding:8px 4px;}
.post-metric-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#fff;}
.post-metric-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:#6a7fa8;text-transform:uppercase;margin-top:3px;letter-spacing:1px;}
.post-er{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);margin-left:auto;}
.post-er.low{background:var(--bg-card2);color:#6a7fa8;border-color:var(--border);}

/* Insights */
.insight-list{display:flex;flex-direction:column;gap:10px;}
.insight{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:0 14px 14px 0;padding:18px 20px;display:flex;gap:16px;align-items:flex-start;}
.insight-icon{font-size:22px;flex-shrink:0;}
.insight-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:5px;}
.insight-acao{font-size:13px;color:#aab8d0;line-height:1.7;}

/* Loading / Error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#6a7fa8;}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#1a0a10;border:1px solid var(--red);border-radius:12px;padding:16px 20px;color:var(--red);font-size:13px;margin:20px 0;}
.hidden{display:none;}

/* Account header */
.account-header{display:flex;align-items:center;gap:18px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px;}
.account-avatar{width:52px;height:52px;border-radius:50%;background:var(--green-dim);border:2px solid var(--green-border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--green);flex-shrink:0;}
.account-name{font-size:17px;font-weight:700;color:#fff;}
.account-username{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6a7fa8;margin-top:3px;}
.account-bio{font-size:12px;color:#8899bb;margin-top:6px;line-height:1.5;}

/* Buttons */
.page-btn-primary{background:var(--green);border:none;border-radius:10px;padding:10px 20px;color:#000;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;}
.page-btn-primary:hover{background:#00e8b0;}
@media(max-width:600px){.two-col{grid-template-columns:1fr}.kpi-value{font-size:22px}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div style="position:sticky;top:0;z-index:100;background:rgba(8,12,20,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);padding:14px 24px;display:flex;align-items:center;justify-content:space-between">
  <div style="display:flex;align-items:center;gap:16px">
    <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--green)">CENTRAL IA</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px">// ANALYTICS INSTAGRAM</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <span id="last-update" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted)"></span>
    <button class="page-btn-primary" onclick="loadAnalytics()">↻ Atualizar</button>
    <a href="/" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;transition:.2s" onmouseover="this.style.color='var(--green)';this.style.borderColor='var(--green-border)'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)'">← VOLTAR</a>
  </div>
</div>

<div class="container">
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <span style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px">Buscando dados do Instagram...</span>
  </div>
  <div id="error-box" class="error-box hidden"></div>
  <div id="dashboard" class="hidden">
    <div id="account-header" class="account-header"></div>

    <div class="section-label">Resumo — últimos 30 dias</div>
    <div class="kpi-grid" id="kpi-grid"></div>

    <div class="section-label">Alcance diário</div>
    <div class="chart-card">
      <div class="chart-card-label">Alcance por dia</div>
      <div class="chart-wrap"><canvas id="reachChart" role="img" aria-label="Alcance diário dos últimos 30 dias"></canvas></div>
    </div>

    <div class="two-col">
      <div class="chart-card">
        <div class="chart-card-label">Audiência — faixa etária</div>
        <div class="chart-wrap"><canvas id="ageChart" role="img" aria-label="Distribuição por faixa etária"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-label">Audiência — gênero</div>
        <div class="chart-wrap"><canvas id="genderChart" role="img" aria-label="Distribuição por gênero"></canvas></div>
      </div>
    </div>

    <div class="section-label">Top posts — engajamento</div>
    <div class="posts-grid" id="posts-grid"></div>

    <div class="section-label">Insights — gerados por IA</div>
    <div class="insight-list" id="insights-list"></div>
  </div>
</div>

<script>
const AUTH_KEY='cia_token',token=localStorage.getItem(AUTH_KEY)||'';
let rCI=null,aCI=null,gCI=null;
function fmt(n){if(n>=1000)return(n/1000).toFixed(1).replace('.0','')+'K';return String(Math.round(n));}
function typeLabel(t){return{REELS:'REEL',CAROUSEL_ALBUM:'CARROSSEL',IMAGE:'IMAGEM',VIDEO:'VÍDEO',FEED:'FEED'}[t]||t||'POST';}
function typeClass(t){if(t==='REELS')return'type-reel';if(t==='CAROUSEL_ALBUM')return'type-carousel';if(t==='IMAGE')return'type-image';return'type-feed';}
function formatDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}
async function loadAnalytics(){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('error-box').classList.add('hidden');
  try{
    const res=await fetch('/api/instagram/analytics',{headers:token?{Authorization:'Bearer '+token}:{}});
    const data=await res.json();
    if(!res.ok||!data.ok)throw new Error(data.error||'Erro ao buscar dados.');
    renderDashboard(data);
    document.getElementById('last-update').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(err){document.getElementById('error-box').textContent='❌ '+err.message;document.getElementById('error-box').classList.remove('hidden');}
  finally{document.getElementById('loading').classList.add('hidden');}
}
function renderDashboard(data){
  const{account,summary,daily,posts,audience,insights}=data;
  document.getElementById('account-header').innerHTML=`<div class="account-avatar">${(account.username||'F')[0].toUpperCase()}</div><div><div class="account-name">${account.name||account.username}</div><div class="account-username">@${account.username}</div>${account.biography?`<div class="account-bio">${account.biography.slice(0,120)}</div>`:''}</div><div style="margin-left:auto;text-align:right"><div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--green)">${fmt(summary.followers)}</div><div class="kpi-label" style="margin:0;margin-top:4px">seguidores</div></div>`;
  const kpis=[{label:'novos seguidores',value:'+'+fmt(summary.totalNewFollowers),sub:'no período'},{label:'alcance total',value:fmt(summary.totalReach),sub:'alcance único'},{label:'impressões',value:fmt(summary.totalImpressions),sub:'visualizações'},{label:'engajamento',value:fmt(summary.totalEngagement),sub:`ER ${summary.avgER}% s/ alcance`},{label:'likes',value:fmt(summary.totalLikes),sub:''},{label:'saves',value:fmt(summary.totalSaves),sub:'sinal forte p/ algoritmo'},{label:'comentários',value:fmt(summary.totalComments),sub:''},{label:'shares',value:fmt(summary.totalShares),sub:''}];
  document.getElementById('kpi-grid').innerHTML=kpis.map(k=>`<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div>${k.sub?`<div class="kpi-sub">${k.sub}</div>`:''}</div>`).join('');
  const rd=daily.reach||[],labels=rd.map(v=>v.date?v.date.slice(5):''),values=rd.map(v=>v.value||0);
  if(rCI)rCI.destroy();
  rCI=new Chart(document.getElementById('reachChart'),{type:'line',data:{labels,datasets:[{label:'Alcance',data:values,borderColor:'#00D4A0',backgroundColor:'rgba(0,212,160,0.06)',fill:true,tension:0.3,pointRadius:values.map(v=>v>(Math.max(...values)*0.5)?4:2),borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#3a4468',font:{size:9},maxRotation:45,autoSkip:true,maxTicksLimit:10},grid:{color:'#1e2840'}},y:{ticks:{color:'#3a4468',font:{size:9},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v},grid:{color:'#1e2840'}}}}});
  const ab={};for(const i of(audience.ageGender||[])){const d=i.dimension_values||[],a=d[0]||d[1]||'?';ab[a]=(ab[a]||0)+(i.value||0);}
  const al=Object.keys(ab).sort(),av=al.map(k=>ab[k]);
  if(aCI)aCI.destroy();
  aCI=new Chart(document.getElementById('ageChart'),{type:'bar',data:{labels:al.length?al:['35-44','25-34','45-54','18-24','55-64','65+'],datasets:[{data:av.length?av:[855,616,547,120,277,157],backgroundColor:'#1e2840',borderColor:'#00D4A0',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#3a4468',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#3a4468',font:{size:9}},grid:{color:'#1e2840'}}}}});
  const gm={};for(const i of(audience.gender||[])){const k=(i.dimension_values?.[0]||'?').toUpperCase();gm[k]=(i.value||0);}
  const gl=Object.keys(gm).length?Object.keys(gm):['M','F','U'],gv=gl.map(k=>gm[k]||0),gc={M:'#4f9eff',F:'#ff5c72',U:'#3a4468',MALE:'#4f9eff',FEMALE:'#ff5c72',UNKNOWN:'#3a4468'};
  if(gCI)gCI.destroy();
  gCI=new Chart(document.getElementById('genderChart'),{type:'doughnut',data:{labels:gl,datasets:[{data:gv.some(v=>v>0)?gv:[51,36,13],backgroundColor:gl.map(l=>gc[l]||'#3a4468'),borderColor:'#080c14',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#7e8cb0',font:{size:10},boxWidth:10,padding:12}}}}});
  const avgER=parseFloat(summary.avgER)||0;
  document.getElementById('posts-grid').innerHTML=(posts||[]).map(p=>{const er=parseFloat(p.er)||0;const highEr=er>avgER*1.2;return`<div class="post-card${highEr?' high-er':''}"><div class="post-header"><span class="post-type ${typeClass(p.type)}">${typeLabel(p.type)}</span><span class="post-er${er<1?' low':''}">ER ${p.er}%</span><span class="post-date">${formatDate(p.timestamp)}</span></div><div class="post-caption">${p.caption||'(sem legenda)'}</div><div class="post-metrics"><div class="post-metric"><div class="post-metric-val">${fmt(p.reach)}</div><div class="post-metric-label">alcance</div></div><div class="post-metric"><div class="post-metric-val">${fmt(p.likes)}</div><div class="post-metric-label">likes</div></div><div class="post-metric"><div class="post-metric-val">${fmt(p.saved)}</div><div class="post-metric-label">saves</div></div><div class="post-metric"><div class="post-metric-val">${fmt(p.shares)}</div><div class="post-metric-label">shares</div></div></div></div>`}).join('');
  document.getElementById('insights-list').innerHTML=(insights||[]).map(i=>`<div class="insight"><span class="insight-icon">${i.icone||'💡'}</span><div><div class="insight-title">${i.titulo}</div><div class="insight-acao">${i.acao}</div></div></div>`).join('');
  document.getElementById('dashboard').classList.remove('hidden');
}
(async()=>{try{const c=await fetch('/api/auth/check',{headers:token?{Authorization:'Bearer '+token}:{}});const{ok,required}=await c.json();if(required&&!ok){window.location.href='/?redirect=analytics.html';return;}}catch(e){}loadAnalytics();})();
</script>
</body>
</html>
